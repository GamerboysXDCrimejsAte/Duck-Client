name: Duck Client Build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Compile Duck Client
        run: msbuild DuckClient.sln /p:Configuration=Release /p:Platform=x64
      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: DuckClient-DLL
          path: x64/Release/DuckClient.dll
